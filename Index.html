<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRcode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: white; color: black; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI'; }
    #modal { display: none; }
    #modal.show { display: flex; }
  </style>
</head>
<body>
  <header class="border-b py-6 px-4">
    <h1 class="text-3xl font-black">QRcode</h1>
    <p class="text-gray-600 text-sm">Simple. Fast. Cheap.</p>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6">
    <div class="space-y-6">
      <div>
        <label class="block text-sm font-bold mb-2">What to encode</label>
        <textarea id="text" style="width:100%; height:100px; padding:8px; border:1px solid #ccc; font-size:14px;">https://example.com</textarea>
      </div>

      <div>
        <label class="block text-sm font-bold mb-2">Your QR Code</label>
        <div id="qr" style="width:100%; min-height:250px; background:#f5f5f5; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; padding:20px;">
          <p style="color:#999;">QR code will appear here</p>
        </div>
      </div>
    </div>

    <div style="margin-top: 20px; display: flex; gap: 10px;">
      <button onclick="downloadQR()" style="padding:12px 20px; background:black; color:white; border:none; font-weight:bold; cursor:pointer;">⬇ Download</button>
      <button onclick="copyQR()" style="padding:12px 20px; background:white; color:black; border:1px solid #ccc; font-weight:bold; cursor:pointer;">📋 Copy</button>
    </div>

    <div id="notice" style="display:none; margin-top:16px; padding:12px; background:#fffacd; border:1px solid #ccc; font-size:13px;">
      💡 Free tier: View & copy only. Upgrade to download.
    </div>
  </main>

  <div id="modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:50;">
    <div style="background:white; padding:24px; border-radius:8px; max-width:300px; width:90%;">
      <h2 style="font-size:20px; font-weight:bold; margin-bottom:16px;">Upgrade Now</h2>
      
      <div style="margin-bottom:12px; padding:12px; border:1px solid #ddd; border-radius:4px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
          <span style="font-weight:bold;">7-Day Trial</span>
          <span style="font-weight:bold;">$1</span>
        </div>
        <p style="font-size:13px; color:#666; margin-bottom:8px;">Full access for 7 days.</p>
        <button onclick="buyTrial()" style="width:100%; padding:8px; background:black; color:white; border:none; font-weight:bold; cursor:pointer;">Get Trial</button>
      </div>

      <div style="margin-bottom:12px; padding:12px; border:2px solid black; border-radius:4px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
          <span style="font-weight:bold;">Annual</span>
          <span style="font-weight:bold;">$15/yr</span>
        </div>
        <p style="font-size:13px; color:#666; margin-bottom:8px;">Full access for 1 year.</p>
        <button onclick="buyAnnual()" style="width:100%; padding:8px; background:black; color:white; border:none; font-weight:bold; cursor:pointer;">Subscribe</button>
      </div>

      <button onclick="closeModal()" style="width:100%; padding:8px; background:#f0f0f0; border:none; cursor:pointer;">Close</button>
    </div>
  </div>

  <footer style="border-top:1px solid #eee; margin-top:40px; padding:20px 16px; text-align:center; font-size:12px; color:#999;">
    QRcode © 2026
  </footer>

  <script>
    let qrUrl = '';
    let hasAccess = false;

    document.getElementById('text').addEventListener('input', updateQR);
    updateQR();
    checkAccess();

    function updateQR() {
      const text = document.getElementById('text').value.trim();
      if (!text) {
        document.getElementById('qr').innerHTML = '<p style="color:#999;">QR code will appear here</p>';
        qrUrl = '';
        return;
      }
      const encoded = encodeURIComponent(text);
      qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encoded}`;
      document.getElementById('qr').innerHTML = `<img src="${qrUrl}" style="max-width:100%; height:auto;">`;
    }

    function checkAccess() {
      const trial = localStorage.getItem('qr_trial');
      const annual = localStorage.getItem('qr_annual');
      
      if (trial && new Date(trial) > new Date()) {
        hasAccess = true;
      } else if (annual) {
        hasAccess = true;
      }

      document.getElementById('notice').style.display = hasAccess ? 'none' : 'block';
    }

    function downloadQR() {
      if (!hasAccess) {
        document.getElementById('modal').classList.add('show');
        return;
      }
      if (!qrUrl) return;
      const link = document.createElement('a');
      link.href = qrUrl;
      link.download = 'qrcode.png';
      link.click();
    }

    function copyQR() {
      if (!hasAccess) {
        document.getElementById('modal').classList.add('show');
        return;
      }
      if (!qrUrl) return;
      navigator.clipboard.writeText(qrUrl).then(() => {
        alert('Copied!');
      });
    }

    function buyTrial() {
      const end = new Date();
      end.setDate(end.getDate() + 7);
      localStorage.setItem('qr_trial', end.toISOString());
      hasAccess = true;
      closeModal();
      checkAccess();
      alert('Trial activated! 7 days of full access.');
    }

    function buyAnnual() {
      localStorage.setItem('qr_annual', 'true');
      hasAccess = true;
      closeModal();
      checkAccess();
      alert('Subscription activated! 1 year of full access.');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }
  </script>
</body>
</html>
